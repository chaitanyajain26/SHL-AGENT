services:
  - type: web
    name: shl-assessment-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MODEL_NAME
        value: llama-3.3-70b-versatile
      - key: ALLOW_MODEL_DOWNLOAD
        value: "false"
      - key: GROQ_API_KEY
        sync: false
